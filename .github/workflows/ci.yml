# CPU smoke: imports, ProductKeyStore write/read mechanics, GatedMemoryTap exact-no-op-at-init,
# adapter forward shapes, both documented run styles. No GPU, no model downloads — this partially
# exercises the "pure PyTorch, should run off ROCm" claim (DISCLOSURES.md) on every push.
name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  cpu-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: pyproject.toml
      - name: Cache HF tokenizer (optional real-tokenizer test)
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-qwen3.5-4b-tokenizer
      - name: Install CPU torch + deps
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install transformers numpy pytest
      # `python -m pytest` (not the console script) so the repo root is on sys.path regardless of
      # the pythonpath ini option; belt and suspenders with [tool.pytest.ini_options] pythonpath.
      - name: Smoke tests
        run: python -m pytest tests/ -v
